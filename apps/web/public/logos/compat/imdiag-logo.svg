<svg xmlns="http://www.w3.org/2000/svg" width="220" height="60" viewBox="0 0 220 60" fill="none">
  <!-- Wordmark "Im'Diag" en typo sans-serif bold compressed avec apostrophe accentuee magenta -->
  <text x="12" y="42"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="#1F2937"
    letter-spacing="-1.6">Im<tspan fill="#9D174D" font-size="38">'</tspan>Diag</text>
  <!-- Petite barre d'accent sous "Diag" pour donner identite -->
  <rect x="98" y="48" width="48" height="2.5" rx="1" fill="#9D174D"/>
