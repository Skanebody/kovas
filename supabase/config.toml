# Supabase CLI config for kovas-app
# Cf. https://supabase.com/docs/guides/cli/config

project_id = "kovas-prod"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "https://kovas.fr/**",
  "https://staging.kovas.fr/**",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
# Custom SMTP via Resend (cf. .env.example RESEND_API_KEY)
# Configure dans Supabase Studio Auth Settings > SMTP

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = true }

# Buckets seront créés via migration ou Studio :
# - photos (private, RLS)
# - voice (private, RLS)
# - sketches (private, RLS)
# - exports (private, RLS)
# - owner-documents (private, signed URLs for public upload via token)
# - client-portal (public read via signed URLs)
